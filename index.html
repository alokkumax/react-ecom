<!doctype html>
<!--
  index.html — The single HTML page for our ShoppyGlobe app.

  In a Vite + React project, we usually write almost no HTML by hand.
  React will render all visible content inside the <div id="root"> below.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon shown in the browser tab -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Makes the page look good on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShoppyGlobe</title>
  </head>
  <body>
    <!-- React mounts (attaches) the entire app inside this empty div -->
    <div id="root"></div>
    <!-- Entry point: Vite loads main.jsx, which starts React -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
